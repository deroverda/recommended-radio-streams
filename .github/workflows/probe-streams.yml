name: Stream Audio Health

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/workflows/probe-streams.yml"
      - ".github/scripts/probe-streams.sh"
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/probe-streams.yml"
      - ".github/scripts/probe-streams.sh"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: probe-streams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stream-probe:
    name: Audio Probe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install ffmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg curl ca-certificates

      - name: Probe streams
        id: probe
        shell: bash
        env:
          JOBS: 8
          DECODE_SECONDS: 8
          PROBE_TIMEOUT: 45
          MAX_RETRIES: 3
          RETRY_BASE_DELAY: 2
        run: bash .github/scripts/probe-streams.sh || true

      - name: Upload stream report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-probe-report
          path: stream-report.md
          if-no-files-found: error
          retention-days: 14
