name: Generate Playlists

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/scripts/readme_to_m3u.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-playlists-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate M3U Playlists
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate playlists
        run: python3 .github/scripts/readme_to_m3u.py README.md playlists/

      - name: Commit playlists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlists/
          git diff --cached --quiet || git commit -m "Auto-update playlists from README"
          git push
