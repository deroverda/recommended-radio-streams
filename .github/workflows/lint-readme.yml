name: README Lint & Health

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/workflows/lint-readme.yml"
      - ".github/scripts/lint_readme.py"
      - ".github/scripts/readme_to_m3u.py"
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/lint-readme.yml"
      - ".github/scripts/lint_readme.py"
      - ".github/scripts/readme_to_m3u.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lint-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readme-lint:
    name: Structure & Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Lint README
        shell: bash
        run: |
          python3 .github/scripts/lint_readme.py README.md | tee readme-lint-report.txt
          # Always exits 0 - warn only.

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readme-lint-report
          path: readme-lint-report.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Generate M3U playlists
        shell: bash
        run: |
          python3 .github/scripts/readme_to_m3u.py README.md playlists/

      - name: Commit playlists
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlists/
          git diff --cached --quiet || git commit -m "Auto-update playlists from README"
          git push
