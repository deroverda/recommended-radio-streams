name: Check Stream Links

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "0 0 * * 1"   # weekly on Monday at UTC midnight
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # required only if you later decide to create issues

jobs:
  lychee:
    name: Link Checker
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # -------------------------------------------------
      # Run the Lychee link checker
      # -------------------------------------------------
      - name: Run Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: |
            --verbose
            --no-progress
            --max-retries 3
            --max-concurrency 6
            --host-concurrency 2
            --host-request-interval 1s
            --timeout 120
            --retry-wait-time 15
            --user-agent "Mozilla/5.0"
            --header "Accept: */*"
            --accept "100..=103,200..=299,401,403,406,415,429"
            --exclude "localhost"
            --exclude "reddit\\.com"
            --exclude "127.0.0.1"
            --exclude "::1"
            README.md

      # -------------------------------------------------
      # Upload the Lychee report as an artifact
      # -------------------------------------------------
      - name: Upload Lychee report
        if: always()                     # run even if the previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee/out.md            # adjust if your output path differs
