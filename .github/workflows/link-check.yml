name: Check Stream Links

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/workflows/link-check.yml"
      - ".github/scripts/probe-streams.sh"
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/link-check.yml"
      - ".github/scripts/probe-streams.sh"
  schedule:
    - cron: "0 0 * * 1" # weekly on Monday at UTC midnight
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Link Checker (websites only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Lychee reads .lycheeignore (one regex per line) from the working
      # directory automatically. The --exclude-file flag no longer exists
      # in current lychee, so do not use it.
      - name: Exclude stream URLs from Lychee
        shell: bash
        run: |
          set -euo pipefail

          grep -oE '\[(Stream|Channel [12]|[12])\]\(https?://[^)]+\)' README.md \
            | sed -E 's/.*\((https?:\/\/[^)]+)\)/\1/' \
            | sed -E 's/[][\\.^$?*+(){}|]/\\&/g' \
            | sort -u > .lycheeignore

          echo "Excluded $(wc -l < .lycheeignore) stream URLs from Lychee."

      - name: Run Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          failIfEmpty: true
          format: markdown
          output: lychee/lychee-report.md
          jobSummary: true
          args: |
            --verbose
            --no-progress
            --max-retries 3
            --max-concurrency 6
            --host-concurrency 2
            --host-request-interval 1s
            --timeout 30
            --retry-wait-time 15
            --user-agent "Mozilla/5.0"
            --header "Accept: */*"
            --accept "100..=103,200..=299,401,403,406,415,429"
            --exclude "localhost"
            --exclude "127.0.0.1"
            README.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Optional: the report duplicates the job summary. Delete this step
      # if you decided to drop artifact backups.
      - name: Upload Lychee report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lychee-report
          path: lychee/lychee-report.md
          if-no-files-found: warn
          retention-days: 14
          archive: false

  stream-probe:
    name: Stream Audio Probe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install ffmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg curl ca-certificates

      - name: Probe streams
        id: probe
        shell: bash
        env:
          JOBS: 8 # drop to 4 if the blocked list looks noisy
          DECODE_SECONDS: 8
          PROBE_TIMEOUT: 45
        run: bash .github/scripts/probe-streams.sh

      # Optional: the report duplicates the job summary. Delete this step
      # if you decided to drop artifact backups.
      - name: Upload stream report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stream-probe-report
          path: stream-report.md
          if-no-files-found: error
          retention-days: 14
          archive: false

  alpha-check:
    name: Alphabetical Order Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check alphabetical order
        shell: bash
        run: |
          python3 << 'PYEOF'
          import re, sys, os

          with open('README.md', encoding='utf-8') as f:
              lines = f.readlines()

          import unicodedata

          def sort_key(name):
              # Strip markdown link syntax and formatting
              name = re.sub(r'\[([^\]]+)\].*', r'\1', name)
              name = re.sub(r'[*_`]', '', name).strip()
              # Ignore leading "The " for alphabetical sort
              if name.lower().startswith('the '):
                  name = name[4:]
              # Normalise accented characters to their ASCII base
              # so Á/á sorts with A, É/é with E, etc.
              name = unicodedata.normalize('NFD', name)
              name = ''.join(c for c in name if unicodedata.category(c) != 'Mn')
              return name.lower()

          # Minimum station entries before a section is checked.
          # Skips TOC and appendix sections which use list format but
          # aren't station lists. TOC has ~20 entries so we need a
          # different approach - skip sections where entries are
          # anchor links rather than external URLs.
          MIN_ENTRIES = 5

          HEADER_RE = re.compile(r'^#{2,4}\s+')
          # Only match entries with external http(s) links - skips TOC anchor links
          ENTRY_RE  = re.compile(r'^\-\s*(?:⭐\s*)?\[([^\]]+)\]\(https?://')

          current_section = None
          current_entries = []
          issues = []

          def check_section(section, entries):
              if len(entries) < MIN_ENTRIES:
                  return
              for i in range(1, len(entries)):
                  a = sort_key(entries[i-1][1])
                  b = sort_key(entries[i][1])
                  if a > b:
                      issues.append(
                          f"- **{section}**: `{entries[i][1]}` (line {entries[i][0]}) "
                          f"should come before `{entries[i-1][1]}` (line {entries[i-1][0]})"
                      )

          for lineno, line in enumerate(lines, 1):
              if HEADER_RE.match(line):
                  if current_section and current_entries:
                      check_section(current_section, current_entries)
                  current_section = re.sub(r'<[^>]+>', '', line).strip().lstrip('#').strip()
                  current_entries = []
                  continue
              m = ENTRY_RE.match(line)
              if m:
                  current_entries.append((lineno, m.group(1)))

          if current_section and current_entries:
              check_section(current_section, current_entries)

          summary_lines = ['# Alphabetical Order Check\n']

          if issues:
              summary_lines.append(f'**{len(issues)} out-of-order entry/entries found:**\n')
              summary_lines += issues
          else:
              summary_lines.append('All sections are in alphabetical order.')

          output = '\n'.join(summary_lines) + '\n'
          print(output)

          if os.environ.get('GITHUB_STEP_SUMMARY'):
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write(output)

          # Warn only - does not fail the build
          sys.exit(0)
          PYEOF
