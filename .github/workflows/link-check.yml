name: Check Stream Links

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  lychee:
    name: Link Checker
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - List files
        run: ls -la

      - name: Run Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: "--verbose --max-retries 3 --timeout 60 --retry-wait-time 10 --accept '200,202,204,206,301,302,307,308,401,403,405,415,418,429' --exclude 'localhost' --exclude-mail"
          inputs: README.md
