name: Check Stream Links

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/workflows/link-check.yml"
      - ".github/scripts/probe-streams.sh"
      - ".github/scripts/lint_readme.py"
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/link-check.yml"
      - ".github/scripts/probe-streams.sh"
      - ".github/scripts/lint_readme.py"
  schedule:
    - cron: "0 0 * * 1" # weekly on Monday at UTC midnight
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Link Checker (websites only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Lychee reads .lycheeignore (one regex per line) from the working
      # directory automatically, no --exclude-file flag needed.
      - name: Exclude stream URLs from Lychee
        shell: bash
        run: |
          set -euo pipefail
          grep -oE '\[(Stream|Channel [12]|[12])\]\(https?://[^)]+\)' README.md \
            | sed -E 's/.*\((https?:\/\/[^)]+)\)/\1/' \
            | sed -E 's/[][\\.^$?*+(){}|]/\\&/g' \
            | sort -u > .lycheeignore
          echo "Excluded $(wc -l < .lycheeignore) stream URLs from Lychee."

      - name: Run Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          failIfEmpty: true
          format: markdown
          output: lychee/lychee-report.md
          jobSummary: true
          args: |
            --verbose
            --no-progress
            --max-retries 3
            --max-concurrency 6
            --host-concurrency 2
            --host-request-interval 1s
            --timeout 30
            --retry-wait-time 15
            --user-agent "Mozilla/5.0"
            --header "Accept: */*"
            --accept "100..=103,200..=299,401,403,406,415,429"
            --exclude "localhost"
            --exclude "127.0.0.1"
            README.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload Lychee report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lychee-report
          path: lychee/lychee-report.md
          if-no-files-found: warn
          retention-days: 14

  stream-probe:
    name: Stream Audio Probe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install ffmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg curl ca-certificates

      - name: Probe streams
        id: probe
        shell: bash
        env:
          JOBS: 8
          DECODE_SECONDS: 8
          PROBE_TIMEOUT: 30
          MAX_RETRIES: 2
          RETRY_BASE_DELAY: 2
        run: bash .github/scripts/probe-streams.sh || true

      - name: Upload stream report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stream-probe-report
          path: stream-report.md
          if-no-files-found: error
          retention-days: 14

  readme-lint:
    name: README Structure & Style Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Lint README structure
        shell: bash
        run: |
          python3 .github/scripts/lint_readme.py README.md | tee readme-lint-report.txt
          # Warn only - the script always exits 0, never fails the build.

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: readme-lint-report
          path: readme-lint-report.txt
          if-no-files-found: warn
          retention-days: 14
