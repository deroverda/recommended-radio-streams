name: Check Stream Links

on:
  push:
    branches: ["main"]

  schedule:
    - cron: "0 0 * * 1"

  workflow_dispatch:

jobs:
  lychee:
    name: Link Checker
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: >
            --verbose
            --max-retries 3
            --max-concurrency 3
            --timeout 60
            --retry-wait-time 10

            --user-agent "Mozilla/5.0"

            --accept "200,202,204,206,301,302,303,307,308,401,403,415,429"

            --exclude "localhost"
            --exclude "reddit\.com"

            README.md
