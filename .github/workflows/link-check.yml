name: Check Stream Links

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/workflows/link-check.yml"

  schedule:
    - cron: "0 0 * * 1"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    name: Link Checker
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: >
            --verbose
            --no-progress

            --max-retries 3
            --max-concurrency 3
            --host-concurrency 1
            --host-request-interval 500ms
            --timeout 60
            --retry-wait-time 10

            --user-agent "Mozilla/5.0"
            --header "Accept: */*"

            --accept "100..=103,200..=299,401,403,415,429"

            --exclude "localhost"
            --exclude "reddit\.com"

            README.md
