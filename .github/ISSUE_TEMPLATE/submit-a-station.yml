name: Submit a Station
description: Suggest a station for the list.
title: "[Station]: <Name>"
labels: ["submission", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Check that the station isn't already on the list before submitting.

  - type: input
    id: station-name
    attributes:
      label: Station Name
      description: Official name of the station.
      placeholder: e.g. FIP Radio
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: One line. Genre and/or location. Keep it factual.
      placeholder: e.g. French public radio mixing jazz, rock, and world music. Ad-free.
    validations:
      required: true

  - type: dropdown
    id: genre
    attributes:
      label: Category / Genre
      description: Pick the closest section.
      multiple: true
      options:
        - Ambient, Lo-Fi & Chill
        - Classical & Opera
        - College, Freeform & Community
        - Decades, Oldies & Nostalgia
        - "Electronic: General, House & Techno"
        - "Electronic: Hyperpop & Glitchcore"
        - "Electronic: Phonk & Drift"
        - "Electronic: Synthwave & Retrowave"
        - Funk, Soul & Disco
        - Hip-Hop & Rap
        - Jazz & Blues
        - Metal & Heavy
        - News & Spoken Word
        - Reggae & Dub
        - Rock, Indie, Alt, Country & Folk
        - Video Game & Chiptune
        - Soundtracks & Movie Scores
        - World & Regional
        - Christmas Music & Holiday
        - HiRes / Lossless
        - Multi-Station Network
        - Experimental, Nerdy & Scanners
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: other-genre
    attributes:
      label: Custom Genre (if "Other" selected)
      placeholder: e.g. K-Pop, Bluegrass, Math Rock
    validations:
      required: false

  - type: input
    id: website
    attributes:
      label: Official Website / Web Player
      description: Prefer the station homepage over a direct stream URL.
      placeholder: https://www.radiofrance.fr/fip
    validations:
      required: true

  - type: input
    id: stream-url
    attributes:
      label: Direct Stream URL (Optional)
      placeholder: https://icecast.radiofrance.fr/fip-midfi.mp3
    validations:
      required: false

  - type: input
    id: location
    attributes:
      label: Location
      placeholder: Paris, France
    validations:
      required: false

  - type: dropdown
    id: quality
    attributes:
      label: Audio Quality
      options:
        - Unknown
        - Standard (128kbps MP3/AAC)
        - High (192kbps - 256kbps)
        - Lossless / Hi-Res (FLAC/ALAC)
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Final Checks
      options:
        - label: Tested the link in the last 24 hours.
          required: true
        - label: Works globally (no geo-blocking).
          required: true
        - label: Human-curated (no AI-generated playlists).
          required: true