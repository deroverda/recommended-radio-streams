name: Submit a Station
description: Suggest a station for the list.
title: "[Station]: <Name>"
labels: ["submission", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Check that the station isn't already on the list before submitting.

  - type: input
    id: station-name
    attributes:
      label: Station Name
      description: Official name of the station.
      placeholder: e.g. Kiosk Radio
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >
        10-12 words. Genre and/or location. Must come from the station's own
        website or Radio Browser - never invented. Avoid generic terms like
        "curated," "eclectic," "diverse," "24/7," "ad-free."
      placeholder: e.g. Electronic and jazz from a wooden shack in a park in Brussels.
    validations:
      required: true

  - type: input
    id: description-source
    attributes:
      label: Description Source
      description: Where did the description come from? (URL or "Radio Browser")
      placeholder: https://kioskradio.com/about
    validations:
      required: true

  - type: textarea
    id: why-notable
    attributes:
      label: Anything that makes it stand out? (optional)
      description: >
        A named curator, unusual location, or notable history - if there is one.
        Not required. Good music is reason enough on its own.
      placeholder: e.g. Run from a shipping container in a public park.
    validations:
      required: false

  - type: dropdown
    id: genre
    attributes:
      label: Category / Section
      description: Pick the closest existing section in the README.
      multiple: true
      options:
        - Ambient, Lo-Fi & Chill
        - Classical & Opera
        - College, Freeform & Community
        - Decades, Oldies & Nostalgia
        - Electronic
        - Funk, Soul, Hip-Hop & Disco
        - Jazz & Blues
        - Metal & Heavy
        - News & Spoken Word
        - Reggae & Dub
        - Rock, Indie, Alternative, Country & Folk
        - Video Game, Chiptune & Soundtracks
        - World & Regional
        - Christmas & Holiday
        - Experimental, Nerdy & Scanners
        - Multi-Station Network
        - Not sure / other (specify below)
    validations:
      required: true

  - type: input
    id: other-genre
    attributes:
      label: Custom Genre (if "Not sure / other" selected)
      placeholder: e.g. K-Pop, Bluegrass, Math Rock
    validations:
      required: false

  - type: input
    id: website
    attributes:
      label: Official Website / Web Player
      placeholder: https://www.radiofrance.fr/fip
    validations:
      required: true

  - type: input
    id: stream-url
    attributes:
      label: Direct Stream URL
      description: If known. A .pls or .m3u playlist link is fine too.
      placeholder: https://icecast.radiofrance.fr/fip-midfi.mp3
    validations:
      required: false

  - type: input
    id: location
    attributes:
      label: Location
      placeholder: Brussels, Belgium
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Final Checks
      options:
        - label: Tested the link in the last 24 hours.
          required: true
        - label: Works globally (no geo-blocking).
          required: true
        - label: The description is sourced, not written from general impression.
          required: true
